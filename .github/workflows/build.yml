name: Build APK

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Grant execute permission for gradlew
        run: chmod +x TurboGameBooster/gradlew

      - name: Build Debug APK
        working-directory: TurboGameBooster
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TurboGameBooster-debug-${{ github.run_number }}
          path: TurboGameBooster/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
